{% extends "base.html" %}

{% block title %}Todos los Contactos{% endblock %}

{% block header_title %}
<h1 class="mb-3">Todos los Contactos</h1>
{% endblock %}

{% block content %}

<section class="content-section">

    <div class="d-flex justify-content-between align-items-center mx-3 mb-3 flex-wrap gap-2">
        <span class="text-muted" id="activeEventLabel">Cargando...</span>
        <button class="btn btn-sm btn-success" id="exportAllBtn">Exportar Todo</button>
    </div>

    <div class="container-fluid d-flex flex-row mb-3 gap-3">
        <select class="form-select form-select-sm" id="companyFilter">
            <option value="">Todas las Empresas Expositoras</option>
        </select>
        <input type="text" class="form-control form-control-sm" id="searchInput"
            placeholder="Buscar por nombre, correo o empresa...">
    </div>

    <div class="table-responsive mx-2 overflow-auto">
        <table class="table table-dark table-striped align-middle text-center" id="allContactsTable">
            <thead>
                <tr>
                    <th>Empresa Expositora</th>
                    <th>Nombre Completo</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Empresa del Contacto</th>
                    <th>Escaneado por</th>
                    <th>Día</th>
                    <th>Estado de Cita</th>
                </tr>
            </thead>
            <tbody id="allContactsBody">
            </tbody>
        </table>
    </div>

</section>

<script src="{{ url_for('static', filename='js/admin_contacts.js') }}"></script>

{% endblock %}
