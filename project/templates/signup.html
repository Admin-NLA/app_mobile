{% extends "base.html" %}

{% block title %}Registrar Usuario{% endblock %}

{% block b_signup %}<a href="#" class="nav-link active" aria-current="page">Registrar</a>{% endblock %}

{% block header_title %}
    <h1 class="mb-3">Registrar Usuario</h1>
{% endblock %}

{% block content %}
    <section class="page-section">
        <div class="container-fluid d-flex flex-column flex-md-row text-center">
            <div class="register-card container">

                <form id="signupForm" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" name="username" id="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo</label>
                        <input type="email" name="email" id="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        
                        <label for="companySelector" class="form-label">Empresa</label>
                        <!--<input type="text" name="companySelector" id="companySelector" class="form-control" required> -->
                        <select class="form-select form-select-sm" id="companySelector">
                            <option value="CMC">CMC</option>
                            {% for company in companies %}
                                <option value="{{ company }}">{{ company }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="typeSelector" class="form-label">Tipo de Usuario</label>
                        <select class="form-select form-select-sm" id="typeSelector" name="typeSelector">
                            <option value="ADMIN">Administrador</option>
                            <option value="STAFF">Staff</option>
                            <option value="EXHIBITOR">Expositor</option>
                        </select>
                    </div>

                    <button class="btn btn-dark w-100 mt-2" type="submit">Registrar</button>

                </form>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        
        const signupForm = document.getElementById('signupForm');
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var email = document.getElementById('email').value;
            var companySelector = document.getElementById('companySelector').value;
            var password = document.getElementById('password').value;
            var typeSelector = document.getElementById('typeSelector').value;

            fetch('/signup', {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username: username, email: email, companySelector: companySelector, password: password, typeSelector: typeSelector })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        theme: "dark",
                        title: "<strong>ÉXITO</strong>",
                        text: data.message,
                        icon: "success"
                    });
                } else {
                    Swal.fire({
                        theme: "dark",
                        title: "<strong>ADVERTENCIA</strong>",
                        text: data.message,
                        icon: "warning"
                    });
                }
            })
            .catch(error => {
                Swal.fire({
                        theme: "dark",
                        title: "<strong>ERROR</strong>",
                        text: 'Ocurrió un error al procesar su solicitud',
                        icon: "error"
                    });
            });

            signupForm.reset();
        });
    </script>
{% endblock %}
